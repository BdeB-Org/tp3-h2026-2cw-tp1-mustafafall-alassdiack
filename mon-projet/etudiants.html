<!DOCTYPE html>
<html lang="fr">
<link rel="stylesheet" href="css/style.css">

<head>
    <meta charset="UTF-8">
    <title>Étudiants</title>
    <link rel="stylesheet" href="css/style.css">
</head>


<h1 style="margin-left: 40px;">
    Gestion des étudiants
</h1>

<nav style="margin-left: 40px;">
    <a href="index.html" style="background-color: #2a6fdb; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; margin-right: 8px;">Accueil</a>
    <a href="inscriptions.html" style="background-color: #2a6fdb; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; margin-right: 8px;">Inscriptions</a>
    <a href="cours.html" style="background-color: #2a6fdb; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none;">Cours</a>
</nav>

<div class="bloc-inscriptions">

    <h2>Liste des étudiants</h2>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Courriel</th>
                <th>Téléphone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-etudiants"></tbody>
    </table>

    <h2>Ajouter un étudiant</h2>

    <form id="form-etudiant">
        <input type="number" name="id" placeholder="ID" required>
        <input type="text" name="nom" placeholder="Nom" required>
        <input type="email" name="courriel" placeholder="Courriel" required>
        <input type="text" name="telephone" placeholder="Téléphone">
        <button type="submit">Ajouter</button>
    </form>

</div>


    <script src="js/api.js"></script>
    <script src="js/etudiants.js"></script>

</body>
</html>
