<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des cours</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Gestion des cours</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="etudiants.html">Étudiants</a>
            <a href="inscriptions.html">Inscriptions</a>
        </nav>
    </header>

    <!-- CONTENU PRINCIPAL -->
    <div class="container">

        <h2>Liste des cours</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Titre</th>
                    <th>Description</th>
                    <th>Durée</th>
                    <th>Instructeur</th>
                    <th>Niveau</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-cours"></tbody>
        </table>

        <h2>Ajouter un cours</h2>

        <form id="form-cours" class="form">
            <label>ID</label>
            <input type="number" name="id" required>

            <label>Titre</label>
            <input type="text" name="titre" required>

            <label>Description</label>
            <input type="text" name="description">

            <label>Durée (heures)</label>
            <input type="number" name="duree">

            <label>ID instructeur</label>
            <input type="number" name="id_instructeur" required>

            <label>ID niveau</label>
            <input type="number" name="id_niveau" required>

            <button type="submit">Ajouter</button>
        </form>

    </div>

    <!-- FOOTER -->
    <footer>
        © 2026 - Gestion des cours | Moustapha Fall
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cours.js"></script>

</body>
</html>
