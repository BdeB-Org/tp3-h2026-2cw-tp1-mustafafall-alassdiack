<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cours</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Gestion des cours</h1>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="etudiants.html">Étudiants</a>
        <a href="inscriptions.html">Inscriptions</a>
    </nav>

    <h2>Liste des cours</h2>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Titre</th>
                <th>Description</th>
                <th>Durée</th>
                <th>Instructeur</th>
                <th>Niveau</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table-cours"></tbody>
    </table>

    <h2>Ajouter un cours</h2>

    <form id="form-cours">
        <input type="number" name="id" placeholder="ID" required>
        <input type="text" name="titre" placeholder="Titre" required>
        <input type="text" name="description" placeholder="Description">
        <input type="number" name="duree" placeholder="Durée (heures)">
        <input type="number" name="id_instructeur" placeholder="ID instructeur" required>
        <input type="number" name="id_niveau" placeholder="ID niveau" required>
        <button type="submit">Ajouter</button>
    </form>

    <script src="js/api.js"></script>
    <script src="js/cours.js"></script>

</body>
</html>
